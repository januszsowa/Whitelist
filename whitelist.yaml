    official:
      - 'https://learn.microsoft.com/en-us/windows/win32/shell/knownfolderid'
      - 'https://learn.microsoft.com/en-us/windows/apps/design/app-settings/store-and-retrieve-app-data'
    forensic:
      - 'https://www.sans.org/white-papers/40190'
      - 'https://www.sans.org/white-papers/34545'
  linux:
    official:
      - 'https://specifications.freedesktop.org/basedir-spec/0.8/'
      - 'https://www.freedesktop.org/wiki/Software/xdg-user-dirs/'
    forensic:
      - 'https://www.sans.org/white-papers/38235'
  macos:
    official:
      - 'https://developer.apple.com/library/archive/documentation/FileManagement/Conceptual/FileSystemProgrammingGuide/FileSystemOverview/FileSystemOverview.html'
      - 'https://developer.apple.com/documentation/security/app-sandbox'
    forensic:
      - 'https://www.sans.org/white-papers/40280'
      - 'https://www.cyberengage.org/post/analyzing-safari-browser-apple-mail-data-and-recents-database-artifacts-on-macos'
  ios:
    official:
      - 'https://developer.apple.com/library/archive/documentation/FileManagement/Conceptual/FileSystemProgrammingGuide/FileSystemOverview/FileSystemOverview.html'
      - 'https://developer.apple.com/documentation/foundation/url/documentsdirectory'
    forensic:
      - 'https://www.sans.org/white-papers/34092'
      - 'https://www.magnetforensics.com/blog/the-meaning-of-messages/'
      - 'https://www.magnetforensics.com/blog/bringing-it-back-with-biome-data'
  android:
    official:
      - 'https://developer.android.com/training/data-storage/app-specific'
      - 'https://developer.android.com/reference/android/os/Environment'
      - 'https://developer.android.com/training/articles/direct-boot'
    forensic:
      - 'https://www.magnetforensics.com/white-papers/android-nougat-forensic-analysis/'
      - 'https://www.magnetforensics.com/resources/download-white-paper-android-acquisition-methods/'
      - 'https://www.magnetforensics.com/resources/white-paper-demystifying-android-marshmallow-forensic-analysis/'
